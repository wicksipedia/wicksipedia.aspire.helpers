name: Publish

# Bump <Version> in the package(s) you want to release, commit, then push a tag: v13.4.6
# Packs the whole solution and pushes every .nupkg; --skip-duplicate means only
# newly-bumped versions actually publish, so no per-package tag wiring is needed.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC token issuance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release # gate: set required reviewers on this env (and pin it on the NuGet policy)
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - run: dotnet pack Wicksipedia.Aspire.Helpers.slnx -c Release -o ./artifacts
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
      - run: dotnet nuget push "./artifacts/*.nupkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
